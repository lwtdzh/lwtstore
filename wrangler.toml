name = "lwt-store"
compatibility_date = "2024-12-01"

# FILES D1 database - stores file metadata and parts info
[[d1_databases]]
binding = "FILES"
database_name = "FILES"
database_id = "YOUR_FILES_D1_DATABASE_ID"

# METADATA KV - reserved for future use (e.g., site config, user settings)
[[kv_namespaces]]
binding = "METADATA"
id = "YOUR_METADATA_KV_NAMESPACE_ID"
preview_id = "YOUR_METADATA_PREVIEW_KV_NAMESPACE_ID"

# GITHUB_PRIVATE_KEY should be set as a secret:
# wrangler secret put GITHUB_PRIVATE_KEY

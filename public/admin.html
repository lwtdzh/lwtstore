<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lwt's Store - Admin</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Lwt's Store</h1>
      <p class="subtitle">管理后台</p>
    </header>

    <!-- Login Section -->
    <section id="loginSection">
      <div class="admin-login">
        <h2>管理员登录</h2>
        <input type="password" id="adminPassword" placeholder="请输入管理员密码" autocomplete="off">
        <button class="btn btn-copy" id="loginBtn">登录</button>
        <div class="error-msg" id="loginError" style="display: none;"></div>
      </div>
    </section>

    <!-- Admin Panel (hidden until login) -->
    <section id="adminPanel" style="display: none;">
      <div class="file-list-section">
        <div class="file-list-header">
          <h2>文件管理</h2>
          <div class="search-box">
            <input type="text" id="adminSearchInput" placeholder="搜索文件名..." autocomplete="off">
          </div>
        </div>
        <div class="file-list" id="adminFileList">
          <div class="loading" id="adminFileListLoading">加载中...</div>
          <div class="empty-state" id="adminEmptyState" style="display: none;">
            暂无文件
          </div>
          <table class="file-table" id="adminFileTable" style="display: none;">
            <thead>
              <tr>
                <th>文件名</th>
                <th>大小</th>
                <th>上传时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="adminFileTableBody">
            </tbody>
          </table>
          <!-- Pagination -->
          <div class="pagination" id="adminPagination" style="display: none;">
            <div class="pagination-info">
              <span id="adminPaginationInfo"></span>
              <select id="adminPageSizeSelect">
                <option value="10">10 条/页</option>
                <option value="20" selected>20 条/页</option>
                <option value="50">50 条/页</option>
                <option value="100">100 条/页</option>
              </select>
            </div>
            <div class="pagination-controls">
              <button class="btn btn-page" id="adminPrevPageBtn" disabled>上一页</button>
              <span class="page-numbers" id="adminPageNumbers"></span>
              <button class="btn btn-page" id="adminNextPageBtn" disabled>下一页</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Delete Confirmation Modal -->
    <div class="modal-overlay" id="deleteModal" style="display: none;">
      <div class="modal">
        <h3>确认删除</h3>
        <p>确定要删除文件 <strong id="deleteFileName"></strong> 吗？</p>
        <p class="modal-warning">此操作不可撤销！</p>
        <div class="modal-actions">
          <button class="btn btn-new" id="cancelDeleteBtn">取消</button>
          <button class="btn btn-delete" id="confirmDeleteBtn">确认删除</button>
        </div>
      </div>
    </div>

    <footer>
      <p><a href="/" class="admin-link">← 返回首页</a></p>
    </footer>
  </div>

  <script src="/admin.js"></script>
</body>
</html>

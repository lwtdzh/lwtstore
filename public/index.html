<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lwt's Store</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <a href="/admin.html" class="btn btn-admin">⚙ Admin</a>
        <a href="https://lwtmirror.pages.dev" class="btn btn-tool" target="_blank" rel="noopener">🚀 国外链接下载速度慢？通过CDN免费加速</a>
      </div>
      <h1>Lwt's Store</h1>
      <p class="subtitle">支持直链、断点续传和多线程下载，分享文件彻底摆脱国内网盘的龟速！链接全公开，如果需要加密，请自行打包成带密码的压缩包再上传！</p>
    </header>

    <!-- Upload Section -->
    <section class="upload-section">
      <div class="upload-area" id="uploadArea">
        <div class="upload-icon">📁</div>
        <p>拖拽文件到此处，或点击选择文件</p>
        <p class="upload-hint">支持最大 5GB 的文件，支持断点续传</p>
        <input type="file" id="fileInput" hidden>
      </div>

      <!-- Upload Progress -->
      <div class="upload-progress" id="uploadProgress" style="display: none;">
        <div class="progress-info">
          <span class="file-name" id="uploadFileName"></span>
          <span class="progress-text" id="progressText">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-details">
          <span id="uploadedSize">0 MB</span> / <span id="totalSize">0 MB</span>
          <span class="upload-speed" id="uploadSpeed"></span>
        </div>
        <div class="progress-details progress-details-row2">
          <span class="upload-status" id="uploadStatus"></span>
          <span class="upload-eta" id="uploadEta"></span>
        </div>
        <button class="btn btn-cancel" id="cancelBtn" style="display: none;">取消</button>
      </div>

      <!-- Upload Complete -->
      <div class="upload-complete" id="uploadComplete" style="display: none;">
        <div class="success-icon">✅</div>
        <p>上传完成！</p>
        <div class="download-link-box">
          <input type="text" id="downloadLinkInput" readonly>
          <button class="btn btn-copy" id="copyLinkBtn">复制链接</button>
        </div>
        <button class="btn btn-new" id="newUploadBtn">上传新文件</button>
      </div>
    </section>

    <!-- File List Section -->
    <section class="file-list-section">
      <div class="file-list-header">
        <h2>已上传的文件</h2>
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="搜索文件名..." autocomplete="off">
        </div>
      </div>
      <div class="file-list" id="fileList">
        <div class="loading" id="fileListLoading">加载中...</div>
        <div class="empty-state" id="emptyState" style="display: none;">
          暂无文件，快来上传第一个文件吧！
        </div>
        <table class="file-table" id="fileTable" style="display: none;">
          <thead>
            <tr>
              <th>文件名</th>
              <th>大小</th>
              <th>上传时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="fileTableBody">
          </tbody>
        </table>
        <!-- Pagination -->
        <div class="pagination" id="pagination" style="display: none;">
          <div class="pagination-info">
            <span id="paginationInfo"></span>
            <select id="pageSizeSelect">
              <option value="10">10 条/页</option>
              <option value="20" selected>20 条/页</option>
              <option value="50">50 条/页</option>
              <option value="100">100 条/页</option>
            </select>
          </div>
          <div class="pagination-controls">
            <button class="btn btn-page" id="prevPageBtn" disabled>上一页</button>
            <span class="page-numbers" id="pageNumbers"></span>
            <button class="btn btn-page" id="nextPageBtn" disabled>下一页</button>
          </div>
        </div>
      </div>
    </section>

    <footer>
      <p>Powered by Cloudflare Pages & GitHub · <a href="/admin.html" class="admin-link">管理</a></p>
    </footer>
  </div>

  <script src="/app.js"></script>
</body>
</html>
